name: CI Example
on: push
jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check README
        run: |
          if [ -f README.md ]; then
            echo "README.md found - PASSED"
          else
            echo "README.md missing - FAILED"
            exit 1
          fi
